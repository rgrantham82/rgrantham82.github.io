<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Robert Grantham's Data Analytics Portfolio</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="/assets/js/script.js" defer></script>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="index.html" class="navbar-brand">Robert Grantham</a>
                <button class="navbar-toggle" aria-label="Toggle navigation">
                    <span class="navbar-toggle-icon"></span>
                </button>
                <div class="navbar-menu">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="portfolio.html">Portfolio</a>
                    <a href="blog.html" class="active">Blog</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero is-primary is-bold animate-on-scroll">
            <div class="container">
                <h1 class="title">Blog</h1>
                <h2 class="subtitle">Latest Insights and Stories</h2>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="columns is-multiline" id="blog-posts">
                    <!-- Blog posts will be dynamically added here -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="content has-text-centered">
                <p>&copy; 2024 Robert Grantham. All rights reserved.</p>
                <p><a href="https://linkedin.com/in/robertgrantham82">LinkedIn</a> | <a href="https://github.com/rgrantham82">GitHub</a></p>
            </div>
        </div>
    </footer>

    <!-- Fetch and render blog posts -->
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const blogPostsContainer = document.getElementById('blog-posts');

            // Function to fetch and render blog posts
            async function fetchAndRenderBlogPosts() {
                try {
                    const response = await fetch('/_posts/posts.json'); // Replace with your actual JSON endpoint
                    const posts = await response.json();

                    posts.forEach(post => {
                        const postDate = new Date(post.date);
                        const formattedDate = postDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

                        const postCard = `
                            <div class="column is-one-third animate-on-scroll">
                                <div class="card">
                                    <div class="card-image">
                                        <figure class="image is-4by3">
                                            <img src="${post.image}" alt="${post.title}">
                                        </figure>
                                    </div>
                                    <div class="card-content">
                                        <div class="media">
                                            <div class="media-content">
                                                <p class="title is-4">${post.title}</p>
                                                <p class="subtitle is-6">${formattedDate}</p>
                                            </div>
                                        </div>
                                        <div class="content">
                                            ${post.excerpt}
                                            <a href="${post.url}">Read more</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                        blogPostsContainer.innerHTML += postCard;
                    });

                } catch (error) {
                    console.error('Error fetching blog posts:', error);
                }
            }

            // Call the function to fetch and render blog posts
            await fetchAndRenderBlogPosts();
        });
    </script>

</body>

</html>
