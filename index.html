---
layout: default
---

<main>
    <section class="hero is-primary is-bold animate-on-scroll">
        <div class="container">
            <h1 class="title">Welcome to Robert Grantham's Data Analyst Portfolio</h1>
            <h2 class="subtitle">Explore my projects and expertise in data analysis and visualization</h2>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="columns is-multiline" id="project-cards">
                <!-- Project cards will be dynamically added here -->
            </div>
        </div>
    </section>
</main>

<script>
    document.addEventListener('DOMContentLoaded', async function () {
        const projectCardsContainer = document.getElementById('project-cards');

        // Function to fetch and render project cards
        async function fetchAndRenderProjectCards() {
            try {
                const response = await fetch('/assets/data/projects.json'); // Replace with your actual JSON endpoint
                const projects = await response.json();

                projects.forEach(project => {
                    const projectCard = `
                        <div class="column is-one-third animate-on-scroll">
                            <div class="card project-card">
                                <div class="card-image">
                                    <figure class="image is-4by3">
                                        <img src="${project.image}" alt="${project.title}">
                                    </figure>
                                </div>
                                <div class="card-content">
                                    <div class="media">
                                        <div class="media-content">
                                            <p class="title is-4">${project.title}</p>
                                            <p class="subtitle is-6">${project.subtitle}</p>
                                        </div>
                                    </div>
                                    <div class="content">
                                        <p>${project.description}</p>
                                        <a href="${project.link}" class="button is-primary" target="_blank">${project.link_text}</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    projectCardsContainer.innerHTML += projectCard;
                });

            } catch (error) {
                console.error('Error fetching or parsing projects:', error);
            }
        }

        // Call the function to fetch and render project cards
        await fetchAndRenderProjectCards();
    });
</script>
