# Site Settings
lang: en
title: Robert Grantham
tagline: Robert Grantham
email: robertgrantham40@gmail.com
description: >
  Welcome to the portfolio of Robert Grantham, a data analyst with expertise in SQL, predictive analytics, data visualization, and more. Explore projects and insights that showcase my skills and experience.

# URL and Base URL
url: "https://rgrantham82.github.io"
baseurl: ""
permalink: pretty

# Theme
remote_theme: chrisrhymes/bulma-clean-theme@v0.14.0
theme_color: '#778899'  # Updated to slate blue dark
force_theme: light
favicon: /assets/images/favicon.png

# Pagination
paginate: 5
paginate_path: "/blog/page:num"

# Disqus Comments
disqus:
  shortname: rgrantham

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - kramdown-parser-gfm
  - jekyll-redirect-from

# Exclusions
exclude: 
  - Gemfile
  - clean-theme.gemspec
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# LiveReload
livereload: true

# Sass
sass:
  style: compressed
  source_dir: _sass

# Google Analytics
#google_analytics: UA-code-here

# Cookie Policy
cookie_policy: /cookie-policy/

# Defaults
defaults:
  -
    scope:
      path: ""
      type: "pages"
    values:
      show_sidebar: true
  -
    scope:
      path: ""
      type: "posts"
    values:
      author: "Robert Grantham"
      layout: post
      show_sidebar: false

# Metadata for SEO
seo:
  title: Robert Grantham's Data Analytics Portfolio
  description: Welcome to the portfolio of Robert Grantham, a data analyst with expertise in SQL, predictive analytics, data visualization, and more.
  author: Robert Grantham
  lang: en
  site_name: Robert Grantham
  image: "/assets/images/profile_photo.jpg"

# Social Media Links
social:
  linkedin: https://www.linkedin.com/in/robertgrantham82
  github: https://github.com/rgrantham82
  email: mailto:robertgrantham40@gmail.com

# Custom variables
custom_vars:
  primary_color: '#778899'
  secondary_color: '#f5f5f5'
  light_color: '#333333'
  dark_color: '#b8860b'
