title: Robert Grantham Art
tagline: Hope, written by hand. Resilience, painted in layers.
description: Contemporary abstract expressionism, calligraphy, and calligraffiti by Robert Grantham - Austin, TX. Originals, commissions, and murals.

author:
  name: Robert Grantham
  email: robertgrantham40@gmail.com
  location: Austin, TX

url: https://rgrantham82.github.io
baseurl: ''

# Aesthetics
theme_color_light: '#faf9f6' # A warm, subtle off-white
theme_color_dark: '#0b0c0f'  # Deep and void-like. Excellent choice.
font_href: https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap
logo: /assets/images/logo.png
favicon: /assets/images/favicon.png
apple_touch_icon: /assets/images/favicon.png

# Social integration
github_username: rgrantham82
instagram_username: robertgranthamart
twitter_username: ''
linkedin_username: robertgrantham82
email: robertgrantham40@gmail.com

# Jekyll Engine Settings
markdown: kramdown
highlighter: rouge
permalink: /:title.html
timezone: America/Chicago
encoding: utf-8
future: true
lsi: false
safe: true
paginate: 6
paginate_path: /page:num
data_dir: _data

# Architecture
collections:
  posts:
    output: true
    permalink: /blog/:title.html
  works:
    output: true
    permalink: /portfolio/:name/

defaults:
- scope:
    path: ''
    type: posts
  values:
    layout: post
    author: Robert Grantham
- scope:
    path: ''
    type: works
  values:
    layout: work
    css: /assets/css/work.css

include:
- _pages
- _data
- assets

exclude:
- node_modules
- Gemfile
- Gemfile.lock
- README.md
- vendor
- .sass-cache
- .jekyll-cache
- _site

# ---------------------------------------------------------
# The Navigation: Lean, mean, and intentional.
# We've removed the individual series links because your new 
# dynamic Portfolio handles them gracefully. 
# ---------------------------------------------------------
nav:
  links:
  - title: Portfolio
    url: /portfolio/
  - title: Commissions
    url: /commissions.html
  - title: Services
    url: /services.html
  - title: About
    url: /about.html
  - title: Blog
    url: /blog/
  # The CTA creates a distinct button in your header for the most important action.
  cta:
    title: Inquire
    url: /contact.html

plugins:
- jekyll-feed
- jekyll-sitemap
- jekyll-seo-tag
