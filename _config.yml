title: Robert Grantham Art
tagline: Contemporary paintings rooted in memory, pressure, and resilience.
description: Contemporary abstract acrylic paintings by Robert Grantham in Austin, Texas. View original works, current series, and commission information.

author:
  name: Robert Grantham
  email: robertgrantham40@gmail.com
  location: Austin, TX

url: https://rgrantham82.github.io
baseurl: ''

# Aesthetics
theme_color_light: '#faf9f6'
theme_color_dark: '#0b0c0f'
font_href: https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap
logo: /assets/images/logo.png
favicon: /assets/images/favicon.png
apple_touch_icon: /assets/images/favicon.png
og_image: /assets/images/work-aurum-rising.jpg

# Social integration
github_username: rgrantham82
instagram_username: robertgranthamart
linkedin_username: robertgrantham82
email: robertgrantham40@gmail.com

# Jekyll Engine Settings
markdown: kramdown
highlighter: rouge
permalink: /:title.html
timezone: America/Chicago
encoding: utf-8
future: true
lsi: false
safe: true
paginate: 6
paginate_path: /page:num
data_dir: _data

# Architecture
collections:
  posts:
    output: true
    permalink: /blog/:title.html
  works:
    output: true
    permalink: /portfolio/:name/

defaults:
- scope:
    path: ''
    type: posts
  values:
    layout: post
    author: Robert Grantham
- scope:
    path: ''
    type: works
  values:
    layout: work
    css: /assets/css/work.css

include:
- _pages
- _data
- assets

exclude:
- node_modules
- Gemfile
- Gemfile.lock
- README.md
- IMPROVEMENTS.md
- vendor
- .sass-cache
- .jekyll-cache
- _site

nav:
  links:
  - title: Available Work
    url: /portfolio/
  - title: Commissions
    url: /commissions.html
  - title: About
    url: /about.html
  - title: Journal
    url: /blog/
  cta:
    title: Contact
    url: /contact.html

plugins:
- jekyll-feed
- jekyll-sitemap
