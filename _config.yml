# ==============================================================
# Site Metadata
# ==============================================================

title: "Robert Grantham Art"
tagline: "Hope, written by hand. Resilience, painted in layers."
description: "Contemporary acrylic painting, calligraphy, and data analytics by Robert Grantham — Austin, TX. Originals, commissions, murals, and writing."

author:
  name: "Robert Grantham"
  email: "robertgrantham40@gmail.com"
  location: "Austin, TX"

url: "https://rgrantham82.github.io"
baseurl: ""   # Do not use a trailing slash unless your site lives in a subdirectory.

# ==============================================================
# Theme & Appearance
# ==============================================================

theme_color_light: "#ffffff"
theme_color_dark: "#0b0c0f"

# Font (optional)
font_href: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"

# Logo and favicon paths (optional)
logo: "/assets/images/logo.png"
favicon: "/assets/images/favicon.ico"
apple_touch_icon: "/assets/favicons/apple-touch-icon.png"

# ==============================================================
# Social Links
# ==============================================================

github_username: rgrantham82
instagram_username: robertgranthamart
twitter_username: ""   # You can add later if needed
linkedin_username: robertgrantham82
email: robertgrantham40@gmail.com

# ==============================================================
# Analytics (optional)
# ==============================================================

# plausible_domain: rgrantham82.github.io
# google_analytics: "G-XXXXXXXXXX"

# ==============================================================
# Collections, Permalinks, Defaults
# ==============================================================

markdown: kramdown
highlighter: rouge

permalink: /:title.html

collections:
  posts:
    output: true
    permalink: /blog/:title.html

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: "Robert Grantham"

# ==============================================================
# Include / Exclude
# ==============================================================

include:
  - _pages
  - _data
  - assets

exclude:
  - node_modules
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .sass-cache
  - .jekyll-cache
  - _site

# ==============================================================
# Navigation (for _layouts/default.html)
# ==============================================================

data_dir: _data

# Optional: you can use _data/nav.yml to override these links.
# But this fallback matches your current default.html.
nav:
  links:
    - title: "Portfolio"
      url: "/portfolio.html"
    - title: "Commissions"
      url: "/commissions.html"
    - title: "Services"
      url: "/services.html"
    - title: "About"
      url: "/about.html"
    - title: "Contact"
      url: "/contact.html"

# ==============================================================
# Plugins (GitHub Pages-supported only)
# ==============================================================

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# ==============================================================
# Build settings
# ==============================================================

timezone: America/Chicago
encoding: utf-8
future: true
lsi: false
safe: true
paginate: 6
paginate_path: "/page:num"
