  - title: Austin Violent Crime Insights Dashboard
    subtitle: Interactive Crime Data Visualization
    description: >
      Developed an interactive Tableau dashboard to analyze violent crime data in Austin, TX. The dashboard provides insights into crime patterns and helps in identifying high-risk areas, supporting law enforcement and community safety initiatives.

      Explore the interactive visualizations to gain a deeper understanding of crime trends.
