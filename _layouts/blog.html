---
layout: default
title: Blog
---

<section id="blog" class="blog-section fade-in">
  <div class="container">
    <h2>Blog</h2>
    {% for post in site.posts %}
    <article class="animate-on-scroll">
      <h3>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </h3>
      <p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
    </article>
    {% endfor %}
  </div>
</section>
