  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in-view');
            observer.unobserve(entry.target);
          }
        });
      });
      document.querySelectorAll('.fadeInUp, .slideInFromLeft, .zoomIn').forEach((el) => {
        observer.observe(el);
      });
    });
  </script>
  <style>
    :root {
      --soft-ivory: #F8F8F6;
      --slate-gray: #718792;
      --deep-charcoal: #333333;
      --misty-blue: #B0C7D4;
      --warm-taupe: #C6A57B;
    }

    /* Navbar consistency and animation */
    .navbar {
      min-height: 80px;
      background-color: var(--deep-charcoal);
      transition: background-color 0.3s, min-height 0.3s;
    }

    .navbar.is-scrolled {
      background-color: var(--slate-gray);
      min-height: 60px;
    }

    /* Hero section animation */
    .hero.is-animated {
      animation: fadeIn 1s ease-in-out;
      background-color: var(--misty-blue);
      color: var(--deep-charcoal);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Project card animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes hoverEffect {
      0% {
        transform: scale(1);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
    }

    .project-card {
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeInUp 0.6s ease forwards;
      background-color: var(--soft-ivory);
      color: var(--deep-charcoal);
    }

    .project-card:hover {
      animation: hoverEffect 0.6s ease;
    }

    .project-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    /* General styles */
    body {
      background-color: var(--soft-ivory);
      color: var(--deep-charcoal);
    }

    a {
      color: var(--slate-gray);
    }

    a:hover {
      color: var(--warm-taupe);
    }

    /* Button styles */
    .button {
      background-color: var(--warm-taupe);
      color: var(--soft-ivory);
    }

    .button:hover {
      background-color: var(--slate-gray);
      color: var(--soft-ivory);
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const navbar = document.querySelector('.navbar');
      const hero = document.querySelector('.hero');

      window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
          navbar.classList.add('is-scrolled');
        } else {
          navbar.classList.remove('is-scrolled');
        }
      });

      hero.classList.add('is-animated');
    });
  </script>
