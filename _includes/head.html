<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#87CEEB">
  <meta name="description" content="Welcome to the portfolio of Robert Grantham, a data analyst with expertise in SQL, predictive analytics, data visualization, and more. Explore projects and insights that showcase my skills and experience.">

  <!-- SEO and Social Media Tags -->
  <meta property="og:title" content="Welcome to my portfolio!">
  <meta property="og:description" content="Welcome to the portfolio of Robert Grantham, a data analyst with expertise in SQL, predictive analytics, data visualization, and more. Explore projects and insights that showcase my skills and experience.">
  <meta property="og:locale" content="en">
  <meta property="og:url" content="https://rgrantham82.github.io/">
  <meta property="og:site_name" content="Robert Grantham">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta property="twitter:title" content="Welcome to my portfolio!">
  <link rel="canonical" href="https://rgrantham82.github.io/">

  <!-- Structured Data for SEO -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "description": "Welcome to the portfolio of Robert Grantham, a data analyst with expertise in SQL, predictive analytics, data visualization, and more. Explore projects and insights that showcase my skills and experience.",
      "headline": "Welcome to my portfolio!",
      "name": "Robert Grantham",
      "url": "https://rgrantham82.github.io/"
    }
  </script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/assets/css/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma-social@1/bin/bulma-social.min.css">
  
  <!-- Favicon -->
  <link rel="shortcut icon" type="image/png" href="/assets/images/favicon~2.png">

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.9.0/dist/cdn.min.js"></script>

  <!-- Jekyll SEO tag -->
  {% seo %}

  <title>{{ page.title | default: site.title }}</title>
</head>
