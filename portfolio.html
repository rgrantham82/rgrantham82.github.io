---
layout: default
title: Portfolio
---

<section id="portfolio" class="animate-on-scroll">
    <h2>Featured Projects</h2>
    <div id="portfolio">
        {% for item in site.data.projects.items %}
        <div class="project-card">
            <div class="card-front">
                <img src="{{ item.image }}" alt="{{ item.title }}">
                <h3>{{ item.title }}</h3>
                <p>{{ item.subtitle }}</p>
            </div>
            <div class="card-back">
                <p>{{ item.description | newline_to_br }}</p>
                <a href="{{ item.link }}" class="button">{{ item.link_text }}</a>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
