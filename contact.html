---
layout: default
title: Contact
---

<section id="contact" class="animate-on-scroll">
    <h2>Contact Me</h2>
    <div class="contact-content">
        <div class="contact-info">
            <p>If you have any questions or would like to discuss potential opportunities, feel free to reach out to me. I'm always open to connecting with fellow professionals and exploring new possibilities.</p>
            
        <div class="contact-form">
            <form action="https://formspree.io/f/mbjnwpgb" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="button">Send Message</button>
            </form>
        </div>
    </div>
</section>
